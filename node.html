<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Node</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }
        
        .back-arrow {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 2.5em;
            cursor: pointer;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s ease;
            line-height: 1;
        }
        
        .back-arrow:hover {
            opacity: 0.7;
        }
        
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .audio-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .audio-item {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
        }
        
        .dot:hover {
            background-color: #e0e0e0;
            box-shadow: 0 0 10px #ffffff;
            transform: scale(1.1);
        }
        
        .dot.active {
            background-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.2);
        }
        
        .audio-player {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
        }
        
        .audio-player.active {
            display: block;
        }
        
        audio {
            width: 100%;
            outline: none;
        }
        
        audio::-webkit-media-controls-panel {
            background-color: #111111;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-arrow">‹</a>
    
    <div class="container">
        <ul class="audio-list" id="audioList">
            <li class="audio-item">
                <div class="dot" onclick="playAudio(0)"></div>
                <audio class="audio-player" id="audio-0">
                    <source src="audio-0.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="playAudio(1)"></div>
                <audio class="audio-player" id="audio-1">
                    <source src="audio-1.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="playAudio(2)"></div>
                <audio class="audio-player" id="audio-2">
                    <source src="audio-2.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="playAudio(3)"></div>
                <audio class="audio-player" id="audio-3">
                    <source src="audio-3.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="playAudio(4)"></div>
                <audio class="audio-player" id="audio-4">
                    <source src="audio-4.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </li>
        </ul>
    </div>
    
    <script>
        let currentAudio = null;
        
        function playAudio(index) {
            // Stop current audio if playing
            if (currentAudio !== null) {
                document.getElementById('audio-' + currentAudio).pause();
                document.getElementById('audio-' + currentAudio).currentTime = 0;
                document.querySelectorAll('.dot')[currentAudio].classList.remove('active');
                document.getElementById('audio-' + currentAudio).classList.remove('active');
            }
            
            // Play selected audio
            currentAudio = index;
            const audio = document.getElementById('audio-' + index);
            const dots = document.querySelectorAll('.dot');
            
            dots[index].classList.add('active');
            audio.classList.add('active');
            audio.play();
        }
    </script>
</body>
</html>
