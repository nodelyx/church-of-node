<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disciples - Church of Node</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: normal;
            letter-spacing: 3px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .header h1:hover {
            opacity: 0.7;
        }

        .header .username {
            font-size: 0.9em;
            color: #aaaaaa;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .header .username:hover {
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-view {
            display: block;
        }

        .chat-view.hidden {
            display: none;
        }

        .chat-container {
            background-color: transparent;
            display: flex;
            flex-direction: column;
            height: 500px;
            border: 1px solid #333;
            border-radius: 2px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            background-color: transparent;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            animation: slideIn 0.3s ease;
        }

        .message:last-child {
            border-bottom: none;
        }

        .message-author {
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffffff;
            font-size: 0.95em;
        }

        .message-content {
            word-wrap: break-word;
            line-height: 1.6;
            color: #e0e0e0;
            font-size: 0.95em;
        }

        .message-time {
            font-size: 0.85em;
            color: #666666;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 15px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            background-color: #111111;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 2px;
            font-family: 'Georgia', serif;
            resize: none;
            max-height: 100px;
            font-size: 0.95em;
        }

        textarea:focus {
            outline: none;
            border-color: #ffffff;
        }

        .button {
            display: inline-block;
            padding: 10px 25px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            border-radius: 2px;
        }

        .button:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .send-btn {
            padding: 10px 25px;
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            border-radius: 2px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            font-size: 0.9em;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .send-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .unauthorized {
            text-align: center;
            padding: 60px 40px;
        }

        .unauthorized h2 {
            font-size: 1.8em;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .unauthorized p {
            font-size: 0.95em;
            color: #aaaaaa;
            margin-bottom: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message::-webkit-scrollbar {
            width: 8px;
        }

        .message::-webkit-scrollbar-track {
            background: #000000;
        }

        .message::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .message::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 onclick="goHome()">Church of Node</h1>
        <div id="userDisplay" style="display: none;">
            <div class="username" onclick="goToProfile()">
                <span id="usernameText"></span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Chat View -->
        <div id="chatView" class="chat-view">
            <div class="chat-container">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Type your message..." rows="2"></textarea>
                    <button class="send-btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </div>

        <!-- Unauthorized View -->
        <div id="unauthorizedView">
            <h2>Access Denied</h2>
            <p>You are not approved as a disciple yet.</p>
            <p>Contact an administrator to request access.</p>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let isDisciple = false;
        let lastMessageTime = null;
        let pollInterval = null;

        // Initialize
        async function init() {
            if (!token || !currentUser) {
                window.location.href = '/forum';
                return;
            }

            updateUserDisplay();
            await checkDiscipleStatus();
            if (isDisciple) {
                await loadMessages();
                // Poll for new messages every 3 seconds
                pollInterval = setInterval(pollNewMessages, 3000);
            }
        }

        // Update user display
        function updateUserDisplay() {
            const userDisplay = document.getElementById('userDisplay');
            if (token && currentUser) {
                userDisplay.style.display = 'block';
                document.getElementById('usernameText').textContent = currentUser.username;
            }
        }

        // Navigation
        function goHome() {
            window.location.href = '/';
        }

        function goToProfile() {
            window.location.href = '/me';
        }

        // Check if user is approved disciple
        async function checkDiscipleStatus() {
            try {
                const response = await fetch(`${API_URL}/admin/status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData.isDisciple) {
                        isDisciple = true;
                        document.getElementById('chatView').classList.remove('hidden');
                        document.getElementById('unauthorizedView').style.display = 'none';
                    } else {
                        document.getElementById('chatView').classList.add('hidden');
                        document.getElementById('unauthorizedView').style.display = 'block';
                    }
                } else {
                    document.getElementById('chatView').classList.add('hidden');
                    document.getElementById('unauthorizedView').style.display = 'block';
                }
            } catch (err) {
                console.error('Error checking status', err);
                document.getElementById('chatView').classList.add('hidden');
                document.getElementById('unauthorizedView').style.display = 'block';
            }
        }

        // Load all messages initially
        async function loadMessages() {
            try {
                const response = await fetch(`${API_URL}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const messages = await response.json();
                    const messagesDiv = document.getElementById('messages');
                    
                    messagesDiv.innerHTML = '';
                    messages.forEach(msg => {
                        addMessageToDOM(msg);
                        lastMessageTime = msg.createdAt;
                    });

                    // Auto scroll to bottom
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else if (response.status === 403) {
                    isDisciple = false;
                    document.getElementById('chatView').classList.add('hidden');
                    document.getElementById('unauthorizedView').style.display = 'block';
                }
            } catch (err) {
                console.error('Error loading messages');
            }
        }

        // Poll for only new messages
        async function pollNewMessages() {
            try {
                const response = await fetch(`${API_URL}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const messages = await response.json();
                    const messagesDiv = document.getElementById('messages');
                    
                    // Only add new messages that came after the last one
                    messages.forEach(msg => {
                        if (!lastMessageTime || new Date(msg.createdAt) > new Date(lastMessageTime)) {
                            addMessageToDOM(msg);
                            lastMessageTime = msg.createdAt;
                        }
                    });

                    // Auto scroll to bottom
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else if (response.status === 403) {
                    isDisciple = false;
                    clearInterval(pollInterval);
                    document.getElementById('chatView').classList.add('hidden');
                    document.getElementById('unauthorizedView').style.display = 'block';
                }
            } catch (err) {
                console.error('Error polling messages');
            }
        }

        // Add a message to the DOM without clearing others
        function addMessageToDOM(msg) {
            const messagesDiv = document.getElementById('messages');
            
            // Check if message already exists
            const existingMsg = Array.from(messagesDiv.children).find(el => 
                el.dataset.messageId === msg._id
            );
            
            if (!existingMsg) {
                const msgElement = document.createElement('div');
                msgElement.className = 'message';
                msgElement.dataset.messageId = msg._id;
                msgElement.innerHTML = `
                    <div class="message-author">${msg.author.username}</div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                    <div class="message-time">${new Date(msg.createdAt).toLocaleTimeString()}</div>
                `;
                messagesDiv.appendChild(msgElement);
            }
        }

        // Send message
        async function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();

            if (!content) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ content })
                });

                if (response.ok) {
                    const newMsg = await response.json();
                    document.getElementById('messageInput').value = '';
                    addMessageToDOM(newMsg);
                    lastMessageTime = newMsg.createdAt;
                    
                    // Auto scroll to bottom
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (err) {
                console.error('Error sending message');
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Clean up interval on page unload
        window.addEventListener('beforeunload', () => {
            if (pollInterval) clearInterval(pollInterval);
        });

        // Initialize on page load
        init();
    </script>
</body>
</html>
