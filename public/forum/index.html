<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church of Node - Community Forum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: normal;
            letter-spacing: 3px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .header h1:hover {
            opacity: 0.7;
        }

        .header .username {
            font-size: 0.9em;
            color: #aaaaaa;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .header .username:hover {
            color: #ffffff;
        }

        .header .auth-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .threads-view {
            display: block;
        }

        .threads-view.hidden {
            display: none;
        }

        .thread-item {
            background-color: transparent;
            padding: 15px 0;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .thread-item:hover {
            border-bottom-color: #ffffff;
        }

        .thread-title {
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .thread-meta {
            font-size: 0.85em;
            color: #aaaaaa;
            letter-spacing: 0.5px;
        }

        .thread-detail {
            display: none;
        }

        .thread-detail.active {
            display: block;
        }

        .back-link {
            font-size: 0.9em;
            color: #aaaaaa;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 30px;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ffffff;
        }

        .thread-detail-title {
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .thread-detail-meta {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        .thread-detail-content {
            margin-bottom: 30px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .replies-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .replies-section h3 {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .reply-item {
            background-color: transparent;
            padding: 15px 0;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        .reply-author {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .reply-content {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .reply-meta {
            font-size: 0.85em;
            color: #aaaaaa;
        }

        .reply-form {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .reply-form.active {
            display: block;
        }

        .reply-form h3 {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            letter-spacing: 1px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #111111;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 2px;
            font-family: 'Georgia', serif;
            font-size: 0.95em;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #ffffff;
        }

        .button {
            display: inline-block;
            padding: 10px 25px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            border-radius: 2px;
        }

        .button:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .auth-section {
            display: none;
            max-width: 500px;
            margin: 0 auto;
        }

        .auth-section.active {
            display: block;
        }

        .auth-section h2 {
            font-size: 1.8em;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .auth-toggle {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
        }

        .auth-toggle a {
            color: #ffffff;
            cursor: pointer;
            text-decoration: underline;
            transition: opacity 0.3s ease;
        }

        .auth-toggle a:hover {
            opacity: 0.7;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 2px;
            text-align: center;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .message.error {
            background-color: #330000;
            color: #ff6b6b;
        }

        .message.success {
            background-color: #003300;
            color: #6bff6b;
        }

        .no-threads {
            color: #aaaaaa;
            text-align: center;
            padding: 40px;
            font-size: 0.95em;
        }

        .like-btn {
            margin-top: 20px;
        }

        textarea {
            min-height: 120px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 onclick="goHome()">Church of Node</h1>
        <div id="userDisplay" style="display: none;">
            <div class="username" onclick="goToProfile()">
                <span id="usernameText"></span>
            </div>
        </div>
        <div id="guestDisplay" class="auth-buttons">
            <button class="button" onclick="showLoginForm()">LOGIN</button>
            <button class="button" onclick="showRegisterForm()">REGISTER</button>
        </div>
    </div>

    <div class="container">
        <div id="messageBox"></div>

        <!-- Threads View -->
        <div id="threadsView" class="threads-view">
            <button class="button" onclick="showCreateThreadForm()" id="createThreadBtn" style="display: none; margin-bottom: 30px;">CREATE NEW THREAD</button>
            <div id="threadsList"></div>
        </div>

        <!-- Thread Detail View -->
        <div id="threadDetailView" class="thread-detail">
            <a class="back-link" onclick="backToThreads()">← Back to Threads</a>
            <h2 id="detailTitle" class="thread-detail-title"></h2>
            <div id="detailMeta" class="thread-detail-meta"></div>
            <div id="detailContent" class="thread-detail-content"></div>
            <div id="detailLikes"></div>
            <div id="repliesSection" class="replies-section"></div>
            <div id="replyForm" class="reply-form">
                <h3>Add Reply</h3>
                <div class="form-group">
                    <textarea id="replyContent" placeholder="Your reply..."></textarea>
                </div>
                <button class="button" onclick="submitReply()">POST REPLY</button>
            </div>
        </div>

        <!-- Auth Forms -->
        <div id="loginSection" class="auth-section">
            <h2>LOGIN</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="button" onclick="login()" style="width: 100%;">LOGIN</button>
            <div class="auth-toggle">
                Don't have an account? <a onclick="showRegisterForm()">Register here</a>
            </div>
        </div>

        <div id="registerSection" class="auth-section">
            <h2>CREATE ACCOUNT</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="registerUsername" placeholder="your username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="••••••••">
            </div>
            <button class="button" onclick="register()" style="width: 100%;">CREATE ACCOUNT</button>
            <div class="auth-toggle">
                Already have an account? <a onclick="showLoginForm()">Login here</a>
            </div>
        </div>

        <div id="createThreadSection" class="auth-section">
            <h2>CREATE NEW THREAD</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="threadTitle" placeholder="Thread title">
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="threadContent" placeholder="Write your thread content..."></textarea>
            </div>
            <button class="button" onclick="submitThread()" style="width: 100%;">CREATE THREAD</button>
            <button class="button" onclick="backToThreads()" style="width: 100%; background-color: #111111; color: #ffffff; border-color: #333; margin-top: 10px;">CANCEL</button>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentThreadId = null;

        // Initialize
        function init() {
            updateUserDisplay();
            loadThreads();
        }

        // Update user display
        function updateUserDisplay() {
            const userDisplay = document.getElementById('userDisplay');
            const guestDisplay = document.getElementById('guestDisplay');
            const createThreadBtn = document.getElementById('createThreadBtn');

            if (token && currentUser) {
                userDisplay.style.display = 'block';
                guestDisplay.style.display = 'none';
                document.getElementById('usernameText').textContent = currentUser.username;
                createThreadBtn.style.display = 'inline-block';
            } else {
                userDisplay.style.display = 'none';
                guestDisplay.style.display = 'flex';
                createThreadBtn.style.display = 'none';
            }
        }

        // Navigation
        function goHome() {
            window.location.href = '/';
        }

        function goToProfile() {
            window.location.href = '/me';
        }

        // Load threads
        async function loadThreads() {
            try {
                const response = await fetch(`${API_URL}/threads`);
                const threads = await response.json();
                const list = document.getElementById('threadsList');
                list.innerHTML = '';

                if (threads.length === 0) {
                    list.innerHTML = '<div class="no-threads">No threads yet. Be the first to create one!</div>';
                    return;
                }

                threads.forEach(thread => {
                    const item = document.createElement('div');
                    item.className = 'thread-item';
                    item.onclick = () => viewThread(thread._id);
                    item.innerHTML = `
                        <div class="thread-title">${thread.title}</div>
                        <div class="thread-meta">by ${thread.author.username} • ${new Date(thread.createdAt).toLocaleDateString()}</div>
                    `;
                    list.appendChild(item);
                });
            } catch (err) {
                showMessage('Error loading threads', 'error');
            }
        }

        // View thread detail
        async function viewThread(threadId) {
            try {
                const response = await fetch(`${API_URL}/threads/${threadId}`);
                const thread = await response.json();
                currentThreadId = threadId;

                document.getElementById('threadsView').classList.add('hidden');
                document.getElementById('threadDetailView').classList.add('active');

                document.getElementById('detailTitle').textContent = thread.title;
                document.getElementById('detailMeta').innerHTML = `
                    by <strong>${thread.author.username}</strong> • ${new Date(thread.createdAt).toLocaleDateString()}
                `;
                document.getElementById('detailContent').textContent = thread.content;

                // Likes
                const likeCount = thread.likes.length;
                const userLiked = token && thread.likes.some(id => id === currentUser.id);
                document.getElementById('detailLikes').innerHTML = `
                    <button class="button like-btn" onclick="likeThread()" style="background-color: ${userLiked ? '#ffffff' : '#111111'}; color: ${userLiked ? '#000000' : '#ffffff'}; border-color: #ffffff;">
                        ❤ ${likeCount}
                    </button>
                `;

                // Replies
                const repliesSection = document.getElementById('repliesSection');
                repliesSection.innerHTML = '<h3>Replies</h3>';

                if (thread.replies.length > 0) {
                    thread.replies.forEach(reply => {
                        const item = document.createElement('div');
                        item.className = 'reply-item';
                        item.innerHTML = `
                            <div class="reply-author">${reply.author.username}</div>
                            <div class="reply-content">${reply.content}</div>
                            <div class="reply-meta">${new Date(reply.createdAt).toLocaleDateString()}</div>
                        `;
                        repliesSection.appendChild(item);
                    });
                } else {
                    repliesSection.innerHTML += '<p style="color: #aaaaaa;">No replies yet.</p>';
                }

                // Reply form
                const replyForm = document.getElementById('replyForm');
                if (token) {
                    replyForm.classList.add('active');
                } else {
                    replyForm.classList.remove('active');
                }
            } catch (err) {
                showMessage('Error loading thread', 'error');
            }
        }

        // Authentication functions
        async function register() {
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            if (!username || !email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showMessage('Account created successfully!', 'success');
                    updateUserDisplay();
                    document.getElementById('registerSection').classList.remove('active');
                    document.getElementById('threadsView').classList.remove('hidden');
                } else {
                    showMessage(data.error || 'Registration failed', 'error');
                }
            } catch (err) {
                showMessage('Error registering', 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showMessage('Logged in successfully!', 'success');
                    updateUserDisplay();
                    document.getElementById('loginSection').classList.remove('active');
                    document.getElementById('threadsView').classList.remove('hidden');
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (err) {
                showMessage('Error logging in', 'error');
            }
        }

        // Thread functions
        async function submitThread() {
            const title = document.getElementById('threadTitle').value;
            const content = document.getElementById('threadContent').value;

            if (!title || !content) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/threads`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, content })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Thread created successfully!', 'success');
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('threadContent').value = '';
                    document.getElementById('createThreadSection').classList.remove('active');
                    loadThreads();
                    document.getElementById('threadsView').classList.remove('hidden');
                } else {
                    showMessage(data.error || 'Error creating thread', 'error');
                }
            } catch (err) {
                showMessage('Error creating thread', 'error');
            }
        }

        async function submitReply() {
            const content = document.getElementById('replyContent').value;

            if (!content) {
                showMessage('Please write a reply', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/replies`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ content, threadId: currentThreadId })
                });

                if (response.ok) {
                    showMessage('Reply posted!', 'success');
                    document.getElementById('replyContent').value = '';
                    viewThread(currentThreadId);
                } else {
                    showMessage('Error posting reply', 'error');
                }
            } catch (err) {
                showMessage('Error posting reply', 'error');
            }
        }

        async function likeThread() {
            if (!token) {
                showMessage('Please login to like threads', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/threads/${currentThreadId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    viewThread(currentThreadId);
                }
            } catch (err) {
                showMessage('Error liking thread', 'error');
            }
        }

        // UI Navigation
        function showLoginForm() {
            document.getElementById('threadsView').classList.add('hidden');
            document.getElementById('threadDetailView').classList.remove('active');
            document.getElementById('createThreadSection').classList.remove('active');
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
        }

        function showRegisterForm() {
            document.getElementById('threadsView').classList.add('hidden');
            document.getElementById('threadDetailView').classList.remove('active');
            document.getElementById('createThreadSection').classList.remove('active');
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.add('active');
        }

        function showCreateThreadForm() {
            document.getElementById('threadsView').classList.add('hidden');
            document.getElementById('threadDetailView').classList.remove('active');
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('createThreadSection').classList.add('active');
        }

        function backToThreads() {
            document.getElementById('threadDetailView').classList.remove('active');
            document.getElementById('createThreadSection').classList.remove('active');
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('threadsView').classList.remove('hidden');
            loadThreads();
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = '', 5000);
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
