<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Node</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }
        
        .back-arrow {
            position: absolute;
            top: 40px;
            left: 40px;
            cursor: pointer;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s ease;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-arrow:hover {
            opacity: 0.7;
        }
        
        .back-arrow svg {
            width: 100%;
            height: 100%;
        }
        
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .audio-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .audio-item {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .horizontal-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }
        
        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dot:hover {
            background-color: #e0e0e0;
            box-shadow: 0 0 10px #ffffff;
            transform: scale(1.1);
        }
        
        .dot.active {
            background-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.2);
        }

        .dot.link {
            display: inline-flex;
        }
        
        .audio-player {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
        }
        
        .audio-player.active {
            display: block;
        }
        
        audio {
            width: 100%;
            outline: none;
        }
        
        audio::-webkit-media-controls-panel {
            background-color: #111111;
        }
    </style>
</head>
<body>
    <a href="/" class="back-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>
    
    <div class="container">
        <ul class="audio-list" id="audioList">
            <li class="audio-item">
                <div class="dot" onclick="toggleAudio(0)"></div>
                <audio class="audio-player" id="audio-0">
                    <source src="1.wav" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="toggleAudio(1)"></div>
                <audio class="audio-player" id="audio-1">
                    <source src="2.wav" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item horizontal-row">
                <a href="/forum" class="dot link"></a>
                <div class="dot" onclick="toggleAudio(2)"></div>
                <audio class="audio-player" id="audio-2">
                    <source src="3.wav" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
                <a href="/disciples" class="dot link"></a>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="toggleAudio(3)"></div>
                <audio class="audio-player" id="audio-3">
                    <source src="4.wav" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </li>
            <li class="audio-item">
                <div class="dot" onclick="toggleAudio(4)"></div>
                <audio class="audio-player" id="audio-4">
                    <source src="5.wav" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </li>
        </ul>
    </div>
    
    <script>
        let currentAudio = null;
        let audioStates = [false, false, false, false, false];
        
        function toggleAudio(index) {
            const audio = document.getElementById('audio-' + index);
            const dots = document.querySelectorAll('.dot:not(.link)');
            
            // If clicking the same dot that's playing, stop it
            if (currentAudio === index && audioStates[index]) {
                audio.pause();
                audio.currentTime = 0;
                dots[index].classList.remove('active');
                audio.classList.remove('active');
                audioStates[index] = false;
                currentAudio = null;
                return;
            }
            
            // Stop any currently playing audio
            if (currentAudio !== null && currentAudio !== index) {
                const prevAudio = document.getElementById('audio-' + currentAudio);
                prevAudio.pause();
                prevAudio.currentTime = 0;
                dots[currentAudio].classList.remove('active');
                prevAudio.classList.remove('active');
                audioStates[currentAudio] = false;
            }
            
            // Play the new audio from the start
            currentAudio = index;
            audio.currentTime = 0;
            dots[index].classList.add('active');
            audio.classList.add('active');
            audio.play();
            audioStates[index] = true;
        }
    </script>
</body>
</html>
